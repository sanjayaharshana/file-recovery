name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  QT_VERSION: "6.8.*"
  CMAKE_VERSION: "4.3.0"

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Remove committed CMake build trees (stale absolute paths)
        shell: bash
        run: rm -rf build build-gui cmake-build-debug

      - uses: lukka/get-cmake@v4.3.0
        with:
          cmakeVersion: ${{ env.CMAKE_VERSION }}
          ninjaVersion: latest

      - uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: windows
          target: desktop
          arch: win64_msvc2022_64

      - name: Configure & build
        run: |
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_PREFIX_PATH="$env:QT_ROOT_DIR"
          cmake --build build --config Release

      - name: Package
        shell: pwsh
        run: |
          $out = "file-recovery-${{ github.ref_name }}-windows-x64"
          New-Item -ItemType Directory -Force -Path $out | Out-Null
          Copy-Item "build\file_recovery.exe" "$out\"
          Copy-Item "build\file_recovery_gui.exe" "$out\"
          & "$env:QT_ROOT_DIR\bin\windeployqt.exe" "$out\file_recovery_gui.exe" --no-compiler-runtime
          Compress-Archive -Path $out -DestinationPath "$out.zip" -Force

      - uses: actions/upload-artifact@v4
        with:
          name: package-windows-x64
          path: file-recovery-${{ github.ref_name }}-windows-x64.zip

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Remove committed CMake build trees (stale absolute paths)
        shell: bash
        run: rm -rf build build-gui cmake-build-debug

      - uses: lukka/get-cmake@v4.3.0
        with:
          cmakeVersion: ${{ env.CMAKE_VERSION }}
          ninjaVersion: latest

      - uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: mac
          target: desktop
          arch: clang_64

      - name: Configure & build
        run: |
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="${QT_ROOT_DIR}"
          cmake --build build

      - name: Package
        run: |
          APP="build/file_recovery_gui.app"
          "$QT_ROOT_DIR/bin/macdeployqt" "$APP" -verbose=1
          OUT="file-recovery-${{ github.ref_name }}-macos-arm64.zip"
          ditto -c -k --sequesterRsrc --keepParent "$APP" "$OUT"

      - uses: actions/upload-artifact@v4
        with:
          name: package-macos-arm64
          path: file-recovery-${{ github.ref_name }}-macos-arm64.zip

  build-linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Remove committed CMake build trees (stale absolute paths)
        run: rm -rf build build-gui cmake-build-debug

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgl1 \
            libxkbcommon-x11-0 \
            libfontconfig1 \
            libfreetype6 \
            libdbus-1-3 \
            libegl1 \
            file

      - uses: lukka/get-cmake@v4.3.0
        with:
          cmakeVersion: ${{ env.CMAKE_VERSION }}
          ninjaVersion: latest

      - uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: linux
          target: desktop
          arch: linux_gcc_64

      - name: Configure & build
        run: |
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="${QT_ROOT_DIR}"
          cmake --build build

      - name: Bundle (linuxdeploy + Qt plugin)
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"
        run: |
          wget -q -O linuxdeploy.AppImage \
            https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q -O linuxdeploy-plugin-qt.AppImage \
            https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy.AppImage linuxdeploy-plugin-qt.AppImage
          ./linuxdeploy.AppImage --appdir AppDir \
            -e build/file_recovery_gui \
            -e build/file_recovery \
            -d packaging/file-recovery-gui.desktop \
            --plugin qt
          tar -czf "file-recovery-${{ github.ref_name }}-linux-x64.tar.gz" -C AppDir .

      - uses: actions/upload-artifact@v4
        with:
          name: package-linux-x64
          path: file-recovery-${{ github.ref_name }}-linux-x64.tar.gz

  publish:
    needs: [build-windows, build-macos, build-linux]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: package-*
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          files: |
            release-assets/*.zip
            release-assets/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
